<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="House of Ascend monogram">
  <defs>
    <linearGradient id="hoaGold" x1="10" y1="90" x2="90" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9e6f1e"/>
      <stop offset="0.25" stop-color="#d4af37"/>
      <stop offset="0.5" stop-color="#fbf2b0"/>
      <stop offset="0.72" stop-color="#e6c766"/>
